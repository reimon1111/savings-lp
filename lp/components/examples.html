<section class="lp-examples" aria-labelledby="examples-title">
  <div class="lp-examples__bloom lp-examples__bloom--1" aria-hidden="true"></div>
  <div class="lp-examples__bloom lp-examples__bloom--2" aria-hidden="true"></div>
  <div class="lp-examples__inner">
    <header class="lp-section-title">
      <h2 id="examples-title" class="lp-section-title__heading">見直しの一例</h2>
      <div class="lp-section-title__rule" aria-hidden="true"></div>
      <p class="lp-section-title__lead">実際のご相談で、このような削減効果がありました</p>
    </header>
    <div class="lp-examples__grid" data-examples-grid></div>

    <template id="lp-examples-fallback">
      <article class="lp-example-card lp-card-soft">
        <div class="lp-example-card__media">
          <img
            class="lp-example-card__img"
            src="assets/images/example-5family-mobile.png"
            width="1024"
            height="682"
            alt="複数台のスマートフォンをテーブルに置き、手に1台持っている様子"
            loading="lazy"
            decoding="async"
          />
        </div>
        <div class="lp-example-card__body">
          <div class="lp-example-card__head">
            <h3 class="lp-example-card__label">5人家族の携帯料金</h3>
          </div>
          <div class="lp-example-card__rows">
            <div class="lp-example-card__row">
              <span class="lp-example-card__muted">見直し前</span>
              <span class="lp-example-card__before">月額 22,500円</span>
            </div>
            <div class="lp-example-card__arrow" aria-hidden="true">↓</div>
            <div class="lp-example-card__row">
              <span class="lp-example-card__muted">見直し後</span>
              <span class="lp-example-card__after"><span class="lp-example-card__mark">月額 9,800円</span></span>
            </div>
          </div>
          <div class="lp-example-card__foot">
            <p class="lp-example-card__saving">
              <span class="lp-example-card__mark">月額12,700円の削減</span>
            </p>
            <p class="lp-example-card__year">年間152,400円の削減</p>
          </div>
        </div>
      </article>
      <article class="lp-example-card lp-card-soft">
        <div class="lp-example-card__media">
          <img
            class="lp-example-card__img"
            src="assets/images/example-electric-gas.png"
            width="1024"
            height="682"
            alt="湯気の立つバスルームと、リビングの点灯したシーリングライトのコラージュ"
            loading="lazy"
            decoding="async"
          />
        </div>
        <div class="lp-example-card__body">
          <div class="lp-example-card__head">
            <h3 class="lp-example-card__label">電気・ガス</h3>
          </div>
          <div class="lp-example-card__rows">
            <div class="lp-example-card__row">
              <span class="lp-example-card__muted">見直し前</span>
              <span class="lp-example-card__before">月額 約18,000円</span>
            </div>
            <div class="lp-example-card__arrow" aria-hidden="true">↓</div>
            <div class="lp-example-card__row">
              <span class="lp-example-card__muted">見直し後</span>
              <span class="lp-example-card__after"><span class="lp-example-card__mark">月額 約12,000円</span></span>
            </div>
          </div>
          <div class="lp-example-card__foot">
            <p class="lp-example-card__saving">
              <span class="lp-example-card__mark">月額約2,900円の削減</span>
            </p>
            <p class="lp-example-card__year">年間約34,800円の削減</p>
          </div>
        </div>
      </article>
      <article class="lp-example-card lp-card-soft">
        <div class="lp-example-card__media">
          <img
            class="lp-example-card__img"
            src="assets/images/example-water-server.png"
            width="1024"
            height="682"
            alt="リビングに置かれたウォーターサーバーと、テーブルの水のコップの様子"
            loading="lazy"
            decoding="async"
          />
        </div>
        <div class="lp-example-card__body">
          <div class="lp-example-card__head">
            <h3 class="lp-example-card__label">ウォーターサーバー</h3>
          </div>
          <div class="lp-example-card__rows">
            <div class="lp-example-card__row">
              <span class="lp-example-card__muted">見直し前</span>
              <span class="lp-example-card__before">月額 6,500円</span>
            </div>
            <div class="lp-example-card__arrow" aria-hidden="true">↓</div>
            <div class="lp-example-card__row">
              <span class="lp-example-card__muted">見直し後</span>
              <span class="lp-example-card__after"><span class="lp-example-card__mark">月額 2,900円</span></span>
            </div>
          </div>
          <div class="lp-example-card__foot">
            <p class="lp-example-card__saving">
              <span class="lp-example-card__mark">月額3,600円の削減</span>
            </p>
            <p class="lp-example-card__year">年間43,200円の削減</p>
          </div>
        </div>
      </article>
    </template>
  </div>
</section>
