<section class="lp-flow" aria-labelledby="flow-title">
  <div class="lp-flow__inner">
    <header class="lp-section-title">
      <h2 id="flow-title" class="lp-section-title__heading">ご相談の流れ</h2>
      <div class="lp-section-title__rule" aria-hidden="true"></div>
    </header>
    <ol class="lp-flow__steps">
      <li class="lp-flow__step">
        <div class="lp-flow__icon-wrap">
          <div class="lp-flow__icon-glow" aria-hidden="true"></div>
          <div class="lp-flow__icon-circle">
            <img src="assets/icons/flow-1.svg" alt="" width="32" height="32" />
          </div>
        </div>
        <p class="lp-flow__step-label">STEP 1</p>
        <h3 class="lp-flow__step-title">ご相談</h3>
        <p class="lp-flow__step-text">まずはお気軽にご相談ください</p>
      </li>
      <li class="lp-flow__step">
        <div class="lp-flow__icon-wrap">
          <div class="lp-flow__icon-glow" aria-hidden="true"></div>
          <div class="lp-flow__icon-circle">
            <img src="assets/icons/flow-2.svg" alt="" width="32" height="32" />
          </div>
        </div>
        <p class="lp-flow__step-label">STEP 2</p>
        <h3 class="lp-flow__step-title">現状確認</h3>
        <p class="lp-flow__step-text">現在のご契約内容をヒアリング</p>
      </li>
      <li class="lp-flow__step">
        <div class="lp-flow__icon-wrap">
          <div class="lp-flow__icon-glow" aria-hidden="true"></div>
          <div class="lp-flow__icon-circle">
            <img src="assets/icons/flow-3.svg" alt="" width="32" height="32" />
          </div>
        </div>
        <p class="lp-flow__step-label">STEP 3</p>
        <h3 class="lp-flow__step-title">プラン比較</h3>
        <p class="lp-flow__step-text">最適なプランを比較・選定</p>
      </li>
      <li class="lp-flow__step">
        <div class="lp-flow__icon-wrap">
          <div class="lp-flow__icon-glow" aria-hidden="true"></div>
          <div class="lp-flow__icon-circle">
            <img src="assets/icons/flow-4.svg" alt="" width="32" height="32" />
          </div>
        </div>
        <p class="lp-flow__step-label">STEP 4</p>
        <h3 class="lp-flow__step-title">ご提案</h3>
        <p class="lp-flow__step-text">分かりやすくご提案します</p>
      </li>
      <li class="lp-flow__step">
        <div class="lp-flow__icon-wrap">
          <div class="lp-flow__icon-glow" aria-hidden="true"></div>
          <div class="lp-flow__icon-circle">
            <img src="assets/icons/flow-5.svg" alt="" width="32" height="32" />
          </div>
        </div>
        <p class="lp-flow__step-label">STEP 5</p>
        <h3 class="lp-flow__step-title">お手続き</h3>
        <p class="lp-flow__step-text">切り替え手続きをサポート</p>
      </li>
    </ol>
  </div>
</section>
