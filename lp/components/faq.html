<section class="lp-faq" aria-labelledby="faq-title">
  <div class="lp-faq__bloom" aria-hidden="true"></div>
  <div class="lp-faq__inner">
    <header class="lp-section-title">
      <h2 id="faq-title" class="lp-section-title__heading">よくあるご質問</h2>
      <div class="lp-section-title__rule" aria-hidden="true"></div>
    </header>
    <div id="lp-faq-list" class="lp-faq__list" data-faq-list></div>

    <template id="lp-faq-fallback">
      <div class="lp-faq__item">
        <button type="button" class="lp-faq__trigger" aria-expanded="false" aria-controls="faq-a1" id="faq-q1">
          <span>相談は本当に無料ですか？</span>
          <img class="lp-faq__icon" src="assets/icons/icon-plus.svg" alt="" width="20" height="20" />
        </button>
        <div class="lp-faq__panel" id="faq-a1" role="region" aria-labelledby="faq-q1">
          <p class="lp-faq__answer">はい、初回のご相談およびお見積りのご提示まで費用はいただいておりません。内容をじっくりご検討いただいたうえで、ご契約は任意です。</p>
        </div>
      </div>
      <div class="lp-faq__item">
        <button type="button" class="lp-faq__trigger" aria-expanded="false" aria-controls="faq-a2" id="faq-q2">
          <span>どのくらい時間がかかりますか？</span>
          <img class="lp-faq__icon" src="assets/icons/icon-plus.svg" alt="" width="20" height="20" />
        </button>
        <div class="lp-faq__panel" id="faq-a2" role="region" aria-labelledby="faq-q2">
          <p class="lp-faq__answer">ヒアリング内容によりますが、初回のオンラインまたはお電話での相談はおおよそ30〜60分程度を想定しています。ご契約の切り替え時期は、各キャリア・事業者の混雑状況にもよります。</p>
        </div>
      </div>
      <div class="lp-faq__item">
        <button type="button" class="lp-faq__trigger" aria-expanded="false" aria-controls="faq-a3" id="faq-q3">
          <span>契約を強制されることはありませんか？</span>
          <img class="lp-faq__icon" src="assets/icons/icon-plus.svg" alt="" width="20" height="20" />
        </button>
        <div class="lp-faq__panel" id="faq-a3" role="region" aria-labelledby="faq-q3">
          <p class="lp-faq__answer">ございません。ご提案内容にご納得いただけない場合は、遠慮なくお断りいただいて構いません。無理な追撃の連絡や押し売りは行いません。</p>
        </div>
      </div>
      <div class="lp-faq__item">
        <button type="button" class="lp-faq__trigger" aria-expanded="false" aria-controls="faq-a4" id="faq-q4">
          <span>オンラインでの相談も可能ですか？</span>
          <img class="lp-faq__icon" src="assets/icons/icon-plus.svg" alt="" width="20" height="20" />
        </button>
        <div class="lp-faq__panel" id="faq-a4" role="region" aria-labelledby="faq-q4">
          <p class="lp-faq__answer">オンライン（ビデオ通話等）でのご相談にも対応しております。お住まいが遠方の方や、お子さまのそばにいながら話したい方にもご利用いただきやすい形式です。ご希望をお知らせください。</p>
        </div>
      </div>
      <div class="lp-faq__item">
        <button type="button" class="lp-faq__trigger" aria-expanded="false" aria-controls="faq-a5" id="faq-q5">
          <span>今使っているサービスの解約手続きは？</span>
          <img class="lp-faq__icon" src="assets/icons/icon-plus.svg" alt="" width="20" height="20" />
        </button>
        <div class="lp-faq__panel" id="faq-a5" role="region" aria-labelledby="faq-q5">
          <p class="lp-faq__answer">新しいプランへのお申し込みから旧契約の解約タイミングまで、手順を一つひとつご案内します。違約金の有無や縛りの期間もあらかじめ確認し、不利にならないよう整理いたします。</p>
        </div>
      </div>
    </template>
  </div>
</section>
