<section class="lp-hero" aria-labelledby="hero-title">
  <div class="lp-hero__bloom lp-hero__bloom--1" aria-hidden="true"></div>
  <div class="lp-hero__bloom lp-hero__bloom--2" aria-hidden="true"></div>
  <div class="lp-hero__bloom lp-hero__bloom--3" aria-hidden="true"></div>
  <div class="lp-hero__grid" data-hero-root>
    <div class="lp-hero__copy">
      <h1 id="hero-title" class="lp-hero__title" data-hero-title>
        <span class="lp-hero__line">毎月の支払い、</span>
        <span class="lp-hero__line"><span class="lp-hero__accent">“なんとなく”</span>のままに</span>
        <span class="lp-hero__line">なっていませんか？</span>
      </h1>
      <div class="lp-hero__lead" data-hero-lead>
        <p>携帯代や電気代、インターネットにガス代など、</p>
        <p>気づけば毎月かかっている固定費。</p>
        <p>ご家庭の支出をまとめて見直し、</p>
        <p>無理のない形で整えます。</p>
      </div>
      <div class="lp-hero__cta">
        <a class="lp-btn lp-btn--hero" href="#contact">無料で相談する</a>
      </div>
    </div>
    <div class="lp-hero__visual">
      <div class="lp-hero__slider" aria-roledescription="carousel">
        <div class="lp-hero__slides" aria-live="polite">
          <img
            class="lp-hero__slide is-active"
            src="assets/images/hero-slide-1.jpg"
            width="1024"
            height="682"
            alt="夫婦で明細を確認して悩んでいるイメージ"
            loading="eager"
            decoding="async"
          />
          <img
            class="lp-hero__slide"
            src="assets/images/hero-slide-2.jpg"
            width="1024"
            height="682"
            alt="請求書とスマートフォンで支出に気づくイメージ"
            loading="lazy"
            decoding="async"
          />
          <img
            class="lp-hero__slide"
            src="assets/images/hero-slide-3.jpg"
            width="1024"
            height="682"
            alt="家族が安心して過ごす未来のイメージ"
            loading="lazy"
            decoding="async"
          />
        </div>

        <button class="lp-hero__arrow lp-hero__arrow--prev" type="button" aria-label="前のスライドへ" data-hero-prev>
          ‹
        </button>
        <button class="lp-hero__arrow lp-hero__arrow--next" type="button" aria-label="次のスライドへ" data-hero-next>
          ›
        </button>
      </div>
    </div>

    <div class="lp-hero__dots" role="tablist" aria-label="スライド選択" data-hero-dots>
      <button class="lp-hero__dot is-active" type="button" role="tab" aria-selected="true" aria-label="スライド1" data-hero-dot="0"></button>
      <button class="lp-hero__dot" type="button" role="tab" aria-selected="false" aria-label="スライド2" data-hero-dot="1"></button>
      <button class="lp-hero__dot" type="button" role="tab" aria-selected="false" aria-label="スライド3" data-hero-dot="2"></button>
    </div>
  </div>
</section>
